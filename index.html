<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Tab</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
       
        :root {
            --bg: #0a0f1f;
            --card-bg: rgba(10, 20, 50, 0.65);
            --text: #e0f0ff;
            --accent: #00f0ff;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0f1f, #0f1b3a);
            color: var(--text);
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .browser-bar {
            background: rgba(10, 15, 40, 0.95);
            border-bottom: 1px solid #00aaff;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.3);
            flex-shrink: 0;
        }
        .tab {
            background: #1a2540;
            color: #a0d8ff;
            padding: 6px 16px;
            border-radius: 6px 6px 0 0;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            border: 1px solid transparent;
        }
        .tab.active {
            background: var(--bg);
            border-bottom: 2px solid var(--accent);
            box-shadow: 0 0 12px var(--accent);
        }
        .controls button {
            width: 32px; height: 32px;
            background: #1a2540;
            border: 1px solid #00aaff;
            border-radius: 50%;
            color: #a0d8ff;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .controls button:hover {
            background: var(--accent);
            color: #0a0f1f;
            box-shadow: 0 0 15px var(--accent);
        }
        .controls button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .url-bar {
            flex: 1;
            background: #0f1b3a;
            border: 1px solid #00aaff;
            border-radius: 9999px;
            padding: 8px 16px;
            color: #c0e0ff;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 0 10px rgba(0, 170, 255, 0.2);
        }
        .url-bar .lock { color: #00ffaa; }

        .main {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: #00aaff #1a2540;
        }
        .main::-webkit-scrollbar { width: 6px; }
        .main::-webkit-scrollbar-thumb { background: #00aaff; border-radius: 10px; }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 52px; height: 52px;
            background: linear-gradient(135deg, #00f0ff, #0088cc);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            box-shadow: 0 0 25px var(--accent);
        }
        .logo-text {
            font-size: 36px;
            font-weight: 700;
            background: linear-gradient(to right, #00f0ff, #a0f0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px var(--accent);
        }
        .search-container {
            width: 100%; max-width: 680px;
            margin-bottom: 48px;
        }
        .search-bar {
            width: 100%;
            background: rgba(10, 25, 60, 0.8);
            border: 2px solid #0088cc;
            border-radius: 9999px;
            padding: 18px 28px;
            font-size: 19px;
            color: #e0f0ff;
            outline: none;
            box-shadow: 0 0 15px rgba(0, 136, 204, 0.4);
            transition: all 0.3s;
        }
        .search-bar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--accent);
        }
        .search-bar::placeholder { color: #88b0ff; }

        .quick-links, .addons {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 18px;
            max-width: 860px;
            width: 100%;
            margin-bottom: 40px;
        }
        .quick-link, .addon {
            background: var(--card-bg);
            border: 1px solid rgba(0, 170, 255, 0.25);
            border-radius: 16px;
            padding: 22px 14px 18px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        .quick-link:hover, .addon:hover {
            transform: translateY(-8px) scale(1.06);
            border-color: var(--accent);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.45);
        }
        .icon-circle {
            width: 62px; height: 62px;
            background: rgba(0, 240, 255, 0.1);
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            border: 3px solid rgba(0, 170, 255, 0.4);
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.3);
        }
        .quick-link:hover .icon-circle, .addon:hover .icon-circle {
            transform: scale(1.15) rotate(8deg);
            border-color: var(--accent);
            box-shadow: 0 0 35px var(--accent);
        }
        .quick-link span, .addon span {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #c0e0ff;
            text-shadow: 0 0 8px rgba(0, 240, 255, 0.6);
        }
        .addon.active {
            border-color: var(--accent);
            box-shadow: 0 0 25px var(--accent);
        }

        .sign-in {
            margin-top: 20px;
            background: linear-gradient(90deg, #00f0ff, #0088cc);
            color: #0a0f1f;
            border: none;
            padding: 14px 36px;
            border-radius: 9999px;
            font-weight: 700;
            font-size: 15.5px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--accent);
            transition: all 0.3s;
        }
        .sign-in:hover {
            transform: scale(1.08);
            box-shadow: 0 0 35px var(--accent);
        }

        .footer {
            position: absolute;
            bottom: 24px;
            left: 0; right: 0;
            display: flex;
            justify-content: space-between;
            padding: 0 40px;
            font-size: 12.5px;
            color: #88aaff;
            z-index: 10;
            pointer-events: none;
        }
        .server-latency { display: flex; align-items: center; gap: 6px; pointer-events: auto; }
        .latency-dot {
            width: 8px; height: 8px;
            background: #00ffaa;
            border-radius: 50%;
            box-shadow: 0 0 10px #00ffaa;
        }

        .iframe-container {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0f1f;
            z-index: 200;
            display: none;
            flex-direction: column;
        }
        .iframe-header {
            background: rgba(10, 15, 40, 0.98);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #00aaff;
        }
        .neon-close {
            background: #1a2540;
            color: var(--accent);
            width: 36px; height: 36px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 0 15px var(--accent);
        }
        .neon-close:hover {
            background: var(--accent);
            color: #0a0f1f;
            box-shadow: 0 0 25px var(--accent);
            transform: scale(1.1);
        }
        iframe { flex: 1; border: none; background: white; }

        .proxy-switcher {
            background: #1a2540; 
            color: #c0e0ff; 
            border: 1px solid #00aaff; 
            border-radius: 9999px; 
            padding: 7px 14px; 
            font-size: 13px; 
            cursor: pointer;
        }
    </style>
</head>
<body>
    <!-- Browser Top Bar -->
    <div class="browser-bar">
        <div class="tab active">
            <span>🌙</span>
            <span>Dreams - New Tab</span>
        </div>
        <div class="controls">
            <button id="back-btn">←</button>
            <button id="forward-btn">→</button>
            <button id="refresh-btn">⟳</button>
        </div>
        <div class="url-bar">
            <span class="lock">🔒</span>
            <span id="top-url">ddx://newtab/</span>
        </div>
        <button id="new-tab-btn" style="background:none;border:none;color:#a0d8ff;font-size:22px;cursor:pointer;">+</button>
    </div>

    <!-- Main Content -->
    <div class="main" id="main-content">
        <div class="logo">
            <div class="logo-icon">🌌</div>
            <div class="logo-text">Dreams</div>
        </div>
        <div class="search-container">
            <input type="text" class="search-bar" placeholder="Search privately." id="search-input">
        </div>

        <!-- Quick Links -->
        <div class="quick-links">
            <div class="quick-link" onclick="openSite('https://google.com')"><div class="icon-circle">🔍</div><span>Google</span></div>
            <div class="quick-link" onclick="openSite('https://youtube.com')"><div class="icon-circle">▶️</div><span>YouTube</span></div>
            <div class="quick-link" onclick="openSite('https://gitlab.com')"><div class="icon-circle">🐙</div><span>GitLab</span></div>
            <div class="quick-link" onclick="openSite('https://reddit.com')"><div class="icon-circle">📕</div><span>Reddit</span></div>
            <div class="quick-link" onclick="openSite('https://twitter.com')"><div class="icon-circle">𝕏</div><span>X</span></div>
            <div class="quick-link" onclick="openSite('https://wikipedia.org')"><div class="icon-circle">📖</div><span>Wikipedia</span></div>
            <div class="quick-link" onclick="openSite('https://stackoverflow.com')"><div class="icon-circle">💻</div><span>Stack Overflow</span></div>
            <div class="quick-link" onclick="openSite('https://discord.com')"><div class="icon-circle">💬</div><span>Discord</span></div>
            <div class="quick-link" onclick="openSite('https://netflix.com')"><div class="icon-circle">🎥</div><span>Netflix</span></div>
            <div class="quick-link" onclick="openSite('https://amazon.com')"><div class="icon-circle">📦</div><span>Amazon</span></div>
            <div class="quick-link" onclick="openSite('https://spotify.com')"><div class="icon-circle">🎵</div><span>Spotify</span></div>
            <div class="quick-link" onclick="openSite('https://twitch.tv')"><div class="icon-circle">📺</div><span>Twitch</span></div>
        </div>

        <!-- Addons -->
        <h2 style="margin: 30px 0 15px; color:#00f0ff; text-shadow: 0 0 10px var(--accent);">Addons</h2>
        <div class="addons">
            <div class="addon" id="adblock-addon" onclick="toggleAdblock()">
                <div class="icon-circle">🚫</div>
                <span>AdBlocker</span>
            </div>
            <div class="addon" id="vencord-addon" onclick="toggleVencord()">
                <div class="icon-circle">🎨</div>
                <span>Vencord</span>
            </div>
        </div>

        <button class="sign-in" onclick="alert('Night+ coming soon ✨')">Sign into Night+</button>
        <div style="height: 150px;"></div>
    </div>

    <!-- Iframe Browser -->
    <div class="iframe-container" id="iframe-container">
        <div class="iframe-header">
            <button class="neon-close" onclick="closeIframe()">×</button>
            <div style="flex:1; background:#1a2540; border-radius:9999px; padding:8px 16px; color:#c0e0ff; font-size:14px;" id="iframe-url">
                Loading neon...
            </div>
            <select id="proxy-switcher" class="proxy-switcher"></select>
        </div>
        <iframe id="dreams-iframe" src=""></iframe>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="server-latency">
            <span class="latency-dot"></span>
            Server Latency: <span id="latency">69ms</span>
        </div>
        <div>GitLab • Discord • Privacy • Terms</div>
    </div>

    <script>
        document.title = "Dreams - New Tab";

        let currentProxy = "corsproxy.io";
        const proxies = {
            "corsproxy.io": "https://corsproxy.io/",
            "allorigins": "https://api.allorigins.win/raw?url=",
            "cors.lol": "https://api.cors.lol/",
            "thingproxy": "https://thingproxy.freeboard.io/fetch/"
        };

        let historyStack = [];
        let currentIndex = -1;
        let currentCleanUrl = '';
        let adblockEnabled = false;
        let vencordEnabled = false;

        function proxyUrl(url) {
            if (!url || !url.startsWith('http')) return url;
            return (proxies[currentProxy] || proxies["corsproxy.io"]) + encodeURIComponent(url);
        }

        function openSite(url) {
            const iframeContainer = document.getElementById('iframe-container');
            const iframe = document.getElementById('dreams-iframe');
            const urlDisplay = document.getElementById('iframe-url');
            const topUrl = document.getElementById('top-url');

            currentCleanUrl = url;

            if (currentIndex < historyStack.length - 1) historyStack = historyStack.slice(0, currentIndex + 1);
            historyStack.push(url);
            currentIndex++;

            iframe.src = url;
            urlDisplay.textContent = url;
            topUrl.textContent = url;
            iframeContainer.style.display = 'flex';
            document.getElementById('main-content').style.display = 'none';

            iframe.onload = applyAddons;
            updateNavButtons();
        }

        function searchDuckDuckGo(query) {
            const searchUrl = "https://duckduckgo.com/?q=" + encodeURIComponent(query);
            openSite(searchUrl);
        }

        function applyAddons() {
            const iframe = document.getElementById('dreams-iframe');
            if (!iframe.contentDocument) return;

            // AdBlocker
            if (adblockEnabled) {
                const adSelectors = [
                    '.ad', '.ads', '.advert', '[id*="ad"]', '[class*="ad"]', 
                    'iframe[src*="ads"]', 'iframe[src*="doubleclick"]', 
                    '[id*="google_ads"]', '.gpt_ad'
                ];
                adSelectors.forEach(selector => {
                    iframe.contentDocument.querySelectorAll(selector).forEach(el => {
                        el.style.display = 'none';
                        el.remove();
                    });
                });
            }

            // Vencord for Discord
            if (vencordEnabled && currentCleanUrl.includes('discord.com')) {
                const script = iframe.contentDocument.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/gh/Vendicated/Vencord@latest/dist/Vencord.user.js';
                iframe.contentDocument.head.appendChild(script);
            }
        }

        function toggleAdblock() {
            adblockEnabled = !adblockEnabled;
            document.getElementById('adblock-addon').classList.toggle('active', adblockEnabled);
            alert(adblockEnabled ? "AdBlocker ENABLED 🔥\nAds will be blocked on loaded pages" : "AdBlocker DISABLED");
            
            // Re-apply immediately if a page is open
            if (document.getElementById('iframe-container').style.display === 'flex') {
                const iframe = document.getElementById('dreams-iframe');
                iframe.src = iframe.src; // force reload to apply blocker
            }
        }

        function toggleVencord() {
            vencordEnabled = !vencordEnabled;
            document.getElementById('vencord-addon').classList.toggle('active', vencordEnabled);
            alert(vencordEnabled ? "Vencord ENABLED 🎨\nOpen Discord to see themes & plugins" : "Vencord DISABLED");
            
            if (document.getElementById('iframe-container').style.display === 'flex' && currentCleanUrl.includes('discord.com')) {
                document.getElementById('dreams-iframe').src = document.getElementById('dreams-iframe').src;
            }
        }

        function closeIframe() {
            const iframeContainer = document.getElementById('iframe-container');
            const mainContent = document.getElementById('main-content');
           
            document.getElementById('dreams-iframe').src = '';
            iframeContainer.style.display = 'none';
            mainContent.style.display = 'flex';
            document.getElementById('top-url').textContent = 'ddx://newtab/';
            historyStack = [];
            currentIndex = -1;
            currentCleanUrl = '';
            updateNavButtons();
        }

        function updateNavButtons() {
            document.getElementById('back-btn').disabled = currentIndex <= 0;
            document.getElementById('forward-btn').disabled = currentIndex >= historyStack.length - 1;
        }

        // Search with DuckDuckGo
        document.getElementById('search-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                let query = this.value.trim();
                if (query) {
                    searchDuckDuckGo(query);
                    this.value = '';
                }
            }
        });

        // Browser controls
        document.getElementById('back-btn').addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                const prev = historyStack[currentIndex];
                currentCleanUrl = prev;
                document.getElementById('dreams-iframe').src = prev;
                document.getElementById('iframe-url').textContent = prev;
                document.getElementById('top-url').textContent = prev;
                updateNavButtons();
            }
        });

        document.getElementById('forward-btn').addEventListener('click', () => {
            if (currentIndex < historyStack.length - 1) {
                currentIndex++;
                const next = historyStack[currentIndex];
                currentCleanUrl = next;
                document.getElementById('dreams-iframe').src = next;
                document.getElementById('iframe-url').textContent = next;
                document.getElementById('top-url').textContent = next;
                updateNavButtons();
            }
        });

        document.getElementById('refresh-btn').addEventListener('click', () => {
            if (currentCleanUrl) {
                document.getElementById('dreams-iframe').src = currentCleanUrl;
            }
        });

        document.getElementById('new-tab-btn').addEventListener('click', () => {
            alert("New neon tab opened ✨");
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") {
                const iframeContainer = document.getElementById('iframe-container');
                if (iframeContainer.style.display === 'flex') closeIframe();
            }
        });

        function createProxySwitcher() {
            const select = document.getElementById('proxy-switcher');
            Object.keys(proxies).forEach(key => {
                const option = document.createElement('option');
                option.value = key;
                option.textContent = key;
                if (key === currentProxy) option.selected = true;
                select.appendChild(option);
            });

            select.addEventListener('change', (e) => currentProxy = e.target.value);
        }

        window.onload = () => {
            document.title = "Dreams - New Tab";
            createProxySwitcher();
            updateNavButtons();
            setInterval(() => {
                document.getElementById('latency').textContent = (Math.floor(Math.random() * 35) + 55) + 'ms';
            }, 3500);
        };
    </script>
</body>
</html>
